name: Generate Anchor IDL

"on":
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID for tracking
        required: true
        type: string

jobs:
  generate-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify lib.rs
        run: |
          FILE="inputs/${{ inputs.job_id }}/lib.rs"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: lib.rs not found at $FILE"
            exit 1
          fi
          echo "lib.rs found: $(wc -c < $FILE) bytes"
          cp "$FILE" /tmp/lib.rs

      - name: Install system deps
        run: sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
          key: anchor-0.30.1-${{ runner.os }}-v2

      - name: Install Solana 1.18.26
        run: |
          if ! command -v solana &>/dev/null; then
            sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI 0.30.1
        run: |
          if ! anchor --version 2>/dev/null | grep -q 0.30.1; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked --force
          fi
          anchor --version

      - name: Solana keygen
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Extract program metadata
        id: meta
        run: |
          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || true)
          [ -z "$PROG" ] && PROG=deployer
          ADDR=$(grep -oP '(?<=declare_id!\(")[^"]+' /tmp/lib.rs 2>/dev/null | head -1 || true)
          [ -z "$ADDR" ] && ADDR=11111111111111111111111111111111
          echo "name=$PROG" >> "$GITHUB_OUTPUT"
          echo "addr=$ADDR" >> "$GITHUB_OUTPUT"
          echo "Program=$PROG addr=$ADDR"

      - name: Setup Anchor project
        run: |
          PROG="${{ steps.meta.outputs.name }}"
          ADDR="${{ steps.meta.outputs.addr }}"
          mkdir -p anchor-project/programs/deployer/src
          cp /tmp/lib.rs anchor-project/programs/deployer/src/lib.rs

          cat > anchor-project/Cargo.toml << 'CEOF'
[workspace]
members = ["programs/deployer"]
resolver = "2"
[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
CEOF

          cat > anchor-project/programs/deployer/Cargo.toml << PEOF
[package]
name = "$PROG"
version = "0.1.0"
edition = "2021"
[lib]
crate-type = ["cdylib", "lib"]
name = "$PROG"
[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build"]
[dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
PEOF

          cat > anchor-project/Anchor.toml << AEOF
[features]
resolution = true
skip-lint = false
[programs.localnet]
$PROG = "$ADDR"
[registry]
url = "https://api.apr.dev"
[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"
[workspace]
members = ["programs/deployer"]
AEOF

      - name: Build Anchor project
        working-directory: anchor-project
        run: anchor build 2>&1

      - name: Save IDL output
        run: |
          IDL=$(find anchor-project/target/idl -name "*.json" 2>/dev/null | head -1)
          if [ -z "$IDL" ]; then
            echo "ERROR: No IDL found"
            exit 1
          fi
          echo "Found IDL: $IDL"
          mkdir -p outputs
          cp "$IDL" "outputs/${{ inputs.job_id }}.json"
          echo "IDL content:"
          cat "outputs/${{ inputs.job_id }}.json"

      - name: Commit IDL
        run: |
          git_user="github-actions[bot]"
          git_email="41898282+github-actions[bot]@users.noreply.github.com"
          git -c user.email="$git_email" -c user.name="$git_user" pull --rebase origin main || true
          git -c user.email="$git_email" -c user.name="$git_user" add "outputs/${{ inputs.job_id }}.json"
          git -c user.email="$git_email" -c user.name="$git_user" commit -m "IDL output for ${{ inputs.job_id }}"
          git push
