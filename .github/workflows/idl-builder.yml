name: Generate Anchor IDL
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID for tracking
        required: true
        type: string

jobs:
  generate-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify lib.rs
        run: |
          FILE="inputs/${{ inputs.job_id }}/lib.rs"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: lib.rs not found at $FILE"
            exit 1
          fi
          echo "lib.rs found: $(wc -c < $FILE) bytes"
          cp "$FILE" /tmp/lib.rs

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev curl

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-anchor-0.30.1-${{ runner.os }}-v1

      - name: Cache Anchor CLI binary
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-bin-0.30.1-${{ runner.os }}-v2

      - name: Install Anchor CLI 0.30.1
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          echo "Installing anchor-cli 0.30.1 from crates.io..."
          cargo install anchor-cli --version "=0.30.1" --force
          echo "Anchor version: $(anchor --version)"

      - name: Verify Anchor version
        run: |
          anchor --version
          which anchor

      - name: Install Solana 1.18.26
        run: |
          if ! command -v solana &>/dev/null; then
            sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Solana keygen
        run: |
          solana --version
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Setup Anchor project from template
        run: |
          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || echo deployer)
          ADDR=$(grep -oP '(?<=declare_id!\(")[^"]+' /tmp/lib.rs 2>/dev/null | head -1 || echo 11111111111111111111111111111111)
          echo "Program name: $PROG"
          echo "Program addr: $ADDR"
          mkdir -p anchor-project/programs/deployer/src
          cp /tmp/lib.rs anchor-project/programs/deployer/src/lib.rs
          cp template/Cargo.toml anchor-project/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" template/programs/deployer/Cargo.toml.tpl > anchor-project/programs/deployer/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" template/Anchor.toml.tpl > anchor-project/Anchor.toml
          echo "=== Anchor.toml ==="
          cat anchor-project/Anchor.toml
          echo "=== programs/deployer/Cargo.toml ==="
          cat anchor-project/programs/deployer/Cargo.toml

      - name: Build Anchor project
        working-directory: anchor-project
        run: |
          anchor build 2>&1
          echo "Build exit code: $?"

      - name: Save IDL output
        run: |
          IDL=$(find anchor-project/target/idl -name "*.json" 2>/dev/null | head -1)
          if [ -z "$IDL" ]; then
            echo "ERROR: No IDL file found in anchor-project/target/idl/"
            find anchor-project/target/ -name "*.json" 2>/dev/null | head -20 || true
            exit 1
          fi
          echo "Found IDL: $IDL"
          cat "$IDL"
          mkdir -p outputs
          cp "$IDL" "outputs/${{ inputs.job_id }}.json"

      - name: Commit IDL output
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          git pull --rebase origin main || true
          git add "outputs/$JOB_ID.json"
          git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -m "IDL output for $JOB_ID"
          git push
