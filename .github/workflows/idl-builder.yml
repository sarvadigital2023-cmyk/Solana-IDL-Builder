name: Generate Anchor IDL
on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string

env:
  SOLANA_VERSION: "2.3.1"

jobs:
  build-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check input
        run: |
          if [ ! -f "inputs/${{ inputs.job_id }}/lib.rs" ]; then
            echo "ERROR: inputs/${{ inputs.job_id }}/lib.rs not found"
            exit 1
          fi
          cp "inputs/${{ inputs.job_id }}/lib.rs" /tmp/lib.rs

      - name: System dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
            ~/.local/share/solana
            ~/.cache/solana
          key: solana-anchor-${{ runner.os }}-v1

      - name: Install Anchor CLI
        run: |
          if [ ! -f ~/.cargo/bin/anchor ]; then
            cargo install anchor-cli --version "=0.30.1"
          fi
          anchor --version

      - name: Install Solana
        run: |
          if [ ! -f ~/.local/share/solana/install/active_release/bin/solana ]; then
            curl -L "https://github.com/anza-xyz/agave/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" -o /tmp/solana.tar.bz2
            mkdir -p ~/.local/share/solana/install
            tar xjf /tmp/solana.tar.bz2 -C ~/.local/share/solana/install
            ln -sfn ~/.local/share/solana/install/solana-release ~/.local/share/solana/install/active_release
          fi
          echo ~/.local/share/solana/install/active_release/bin >> $GITHUB_PATH

      - name: Solana keygen
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Create Anchor project
        run: |
          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || echo "deployer")
          ADDR=$(grep -oP '(?<=declare_id!\(")[^"]+' /tmp/lib.rs | head -1 || true)
          if [ -z "$ADDR" ] || [ ${#ADDR} -lt 32 ]; then
            solana-keygen new --no-bip39-passphrase -o /tmp/prog.json --force
            ADDR=$(solana-keygen pubkey /tmp/prog.json)
            sed -i "s/declare_id!.*$/declare_id!(\"$ADDR\");/" /tmp/lib.rs
          fi
          mkdir -p project/programs/$PROG/src
          cp /tmp/lib.rs project/programs/$PROG/src/lib.rs
          cat > project/Cargo.toml << EOF
          [workspace]
          members = ["programs/$PROG"]
          resolver = "2"
          [workspace.package]
          version = "0.1.0"
          edition = "2021"
          rust-version = "1.84"
          EOF
          cat > project/programs/$PROG/Cargo.toml << EOF
          [package]
          name = "$PROG"
          version.workspace = true
          edition.workspace = true
          [lib]
          crate-type = ["cdylib", "lib"]
          name = "$PROG"
          [features]
          default = []
          idl-build = ["anchor-lang/idl-build"]
          [dependencies]
          anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
          EOF
          cat > project/Anchor.toml << EOF
          [toolchain]
          anchor_version = "0.30.1"
          [features]
          resolution = true
          [programs.localnet]
          $PROG = "$ADDR"
          [registry]
          url = "https://api.apr.dev"
          [provider]
          cluster = "Localnet"
          wallet = "~/.config/solana/id.json"
          [scripts]
          test = "echo 'no tests'"
          EOF
          echo "PROG=$PROG" >> $GITHUB_ENV

      - name: Download platform-tools
        working-directory: project
        run: anchor build --skip-lint 2>&1 || true

      - name: Use host cargo (fixes edition 2024)
        run: |
          PT=$(find ~/.cache/solana -name cargo -path '*/rust/bin/cargo' -type f | head -1)
          HC=$(find ~/.rustup/toolchains -name cargo -path '*/bin/cargo' -type f | grep stable | head -1)
          [ -n "$PT" ] && [ -n "$HC" ] && cp "$HC" "$PT" && echo "Replaced $PT with $HC"

      - name: Pin MSRV-incompatible deps
        working-directory: project
        run: |
          mkdir -p .cargo
          echo '[resolver]' > .cargo/config.toml
          echo 'incompatible-rust-versions = "allow"' >> .cargo/config.toml
          rm -f Cargo.lock
          cargo generate-lockfile 2>&1 || true
          cargo update blake3 --precise 1.7.0 2>&1 || cargo update blake3 --precise 1.7.1 2>&1 || true
          cargo update sha3@0.10.8 --precise 0.10.7 2>&1 || true
          cargo update indexmap@2.14.0 --precise 2.13.1 2>&1 || true
          cargo update unicode-segmentation@1.13.2 --precise 1.12.0 2>&1 || true
          cargo update proc-macro-crate@3.5.0 --precise 3.2.0 2>&1 || true
          cargo fetch 2>&1 | tail -3

      - name: Patch anchor-syn (disable broken source_file call)
        run: |
          F=$(find ~/.cargo/registry/src -name "defined.rs" -path "*anchor-syn*" | head -1)
          [ -z "$F" ] && echo "anchor-syn not found" && exit 1
          sed -i 's/#\[cfg(procmacro2_semver_exempt)\]/#[cfg(procmacro2_semver_exempt_disabled)]/g' "$F"
          echo "Patched: $F"

      - name: Build
        working-directory: project
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
        run: anchor build --skip-lint

      - name: Save IDL
        run: |
          IDL=$(find project/target/idl -name "*.json" | head -1)
          [ -z "$IDL" ] && echo "No IDL found" && exit 1
          mkdir -p outputs
          cp "$IDL" "outputs/${{ inputs.job_id }}.json"
          echo "IDL saved: $(cat outputs/${{ inputs.job_id }}.json | head -c 200)"

      - name: Commit IDL
        run: |
          git pull --rebase origin main || true
          git add "outputs/${{ inputs.job_id }}.json"
          git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -m "IDL for ${{ inputs.job_id }}"
          git push
