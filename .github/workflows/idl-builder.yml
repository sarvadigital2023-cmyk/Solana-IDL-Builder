name: Generate Anchor IDL
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID for tracking
        required: true
        type: string

jobs:
  generate-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify lib.rs
        run: |
          FILE="inputs/${{ inputs.job_id }}/lib.rs"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: lib.rs not found at $FILE"
            exit 1
          fi
          echo "lib.rs found: $(wc -c < $FILE) bytes"
          cp "$FILE" /tmp/lib.rs

      - name: Install system deps
        run: sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
          key: anchor-0.30.1-${{ runner.os }}-v3

      - name: Install Solana 1.18.26
        run: |
          if ! command -v solana &>/dev/null; then
            sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI 0.30.1
        run: |
          if ! anchor --version 2>/dev/null | grep -q 0.30.1; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked --force
          fi
          anchor --version

      - name: Solana keygen
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Setup Anchor project from template
        run: |
          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || echo deployer)
          ADDR=$(grep -oP '(?<=declare_id!\(")[^"]+' /tmp/lib.rs 2>/dev/null | head -1 || echo 11111111111111111111111111111111)
          echo "Program=$PROG addr=$ADDR"
          mkdir -p anchor-project/programs/deployer/src
          cp /tmp/lib.rs anchor-project/programs/deployer/src/lib.rs
          cp template/Cargo.toml anchor-project/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" template/programs/deployer/Cargo.toml.tpl > anchor-project/programs/deployer/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" template/Anchor.toml.tpl > anchor-project/Anchor.toml

      - name: Build Anchor project
        working-directory: anchor-project
        run: anchor build 2>&1

      - name: Save IDL output
        run: |
          IDL=$(find anchor-project/target/idl -name "*.json" 2>/dev/null | head -1)
          if [ -z "$IDL" ]; then
            echo "ERROR: No IDL found after build"
            exit 1
          fi
          echo "Found IDL: $IDL"
          mkdir -p outputs
          cp "$IDL" "outputs/${{ inputs.job_id }}.json"
          cat "outputs/${{ inputs.job_id }}.json"

      - name: Commit IDL
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          git pull --rebase origin main || true
          git add "outputs/$JOB_ID.json"
          git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" -c user.name="github-actions[bot]" commit -m "IDL output for $JOB_ID"
          git push
