name: Generate Anchor IDL
on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string

env:
  SOLANA_VERSION: "2.3.1"

jobs:
  build-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check input
        run: |
          if [ ! -f "inputs/${{ inputs.job_id }}/lib.rs" ]; then
            echo "ERROR: lib.rs not found"
            exit 1
          fi
          cp "inputs/${{ inputs.job_id }}/lib.rs" /tmp/lib.rs
          echo "lib.rs: $(wc -l < /tmp/lib.rs) lines"

      - name: System dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
            ~/.local/share/solana
            ~/.cache/solana
          key: solana-anchor-${{ runner.os }}-v4

      - name: Install Anchor CLI
        run: |
          if [ ! -f ~/.cargo/bin/anchor ]; then
            cargo install anchor-cli --version "=0.30.1"
          fi
          anchor --version

      - name: Install Solana
        run: |
          BIN=~/.local/share/solana/install/active_release/bin/solana
          if [ ! -f "$BIN" ]; then
            curl -L "https://github.com/anza-xyz/agave/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" -o /tmp/solana.tar.bz2
            mkdir -p ~/.local/share/solana/install
            tar xjf /tmp/solana.tar.bz2 -C ~/.local/share/solana/install
            ln -sfn ~/.local/share/solana/install/solana-release ~/.local/share/solana/install/active_release
          fi
          echo ~/.local/share/solana/install/active_release/bin >> $GITHUB_PATH

      - name: Solana keygen
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Create Anchor project
        run: |
          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || echo "deployer")
          echo "Detected program name: $PROG"
          solana-keygen new --no-bip39-passphrase -o /tmp/prog.json --force
          ADDR=$(solana-keygen pubkey /tmp/prog.json)
          echo "Generated program address: $ADDR"
          sed -i "s/declare_id!.*$/declare_id!(\"$ADDR\");/" /tmp/lib.rs
          mkdir -p project/programs/$PROG/src
          cp /tmp/lib.rs project/programs/$PROG/src/lib.rs
          printf '[workspace]\nmembers = ["programs/%s"]\nresolver = "2"\n[workspace.package]\nversion = "0.1.0"\nedition = "2021"\nrust-version = "1.84"\n[profile.release]\noverflow-checks = true\nlto = "fat"\ncodegen-units = 1\n' "$PROG" > project/Cargo.toml
          FEAT_IDL='anchor-lang/idl-build'
          EXTRA_DEPS=''
          if grep -q 'anchor_spl' /tmp/lib.rs; then
            EXTRA_DEPS=$(printf '%s' "$EXTRA_DEPS"'anchor-spl = { version = "0.30.1", features = ["token-2022", "associated-token"] }\n')
            FEAT_IDL=$(printf '%s' "$FEAT_IDL"'", "anchor-spl/idl-build')
          fi
          if grep -q 'spl_token_2022' /tmp/lib.rs; then
            EXTRA_DEPS=$(printf '%s' "$EXTRA_DEPS"'spl-token-2022 = { version = "0.9", features = ["no-entrypoint"] }\n')
          fi
          printf '[package]\nname = "%s"\nversion.workspace = true\nedition.workspace = true\n[lib]\ncrate-type = ["cdylib", "lib"]\nname = "%s"\n[features]\ndefault = []\nidl-build = ["%s"]\n[dependencies]\nanchor-lang = { version = "0.30.1", features = ["init-if-needed"] }\n%s' "$PROG" "$PROG" "$FEAT_IDL" "$EXTRA_DEPS" > project/programs/$PROG/Cargo.toml
          printf '[toolchain]\nanchor_version = "0.30.1"\n[features]\nresolution = true\n[programs.localnet]\n%s = "%s"\n[registry]\nurl = "https://api.apr.dev"\n[provider]\ncluster = "Localnet"\nwallet = "~/.config/solana/id.json"\n[scripts]\ntest = "echo no-tests"\n' "$PROG" "$ADDR" > project/Anchor.toml
          echo "PROG=$PROG" >> $GITHUB_ENV
          echo "--- Cargo.toml ---"
          cat project/programs/$PROG/Cargo.toml

      - name: Download platform-tools
        working-directory: project
        run: anchor build --skip-lint 2>&1 || true

      - name: Use host cargo (fixes edition 2024)
        run: |
          PT=$(find ~/.cache/solana -name cargo -path '*/rust/bin/cargo' -type f 2>/dev/null | head -1 || true)
          HC=$(find ~/.rustup/toolchains -name cargo -path '*/bin/cargo' -type f 2>/dev/null | grep stable | head -1 || true)
          if [ -n "$PT" ] && [ -n "$HC" ]; then
            cp "$HC" "$PT"
            echo "Replaced cargo: $($PT --version)"
          else
            echo "platform-tools cargo not found — skipping (PT=$PT)"
          fi

      - name: Pin MSRV-incompatible deps
        working-directory: project
        run: |
          mkdir -p .cargo
          printf '[resolver]\nincompatible-rust-versions = "allow"\n' > .cargo/config.toml
          rm -f Cargo.lock
          cargo generate-lockfile 2>&1 || true
          cargo update blake3 --precise 1.7.0 2>&1 || cargo update blake3 --precise 1.7.1 2>&1 || true
          cargo update sha3@0.10.8 --precise 0.10.7 2>&1 || true
          cargo update indexmap@2.14.0 --precise 2.13.1 2>&1 || true
          cargo update unicode-segmentation@1.13.2 --precise 1.12.0 2>&1 || true
          cargo update proc-macro-crate@3.5.0 --precise 3.2.0 2>&1 || true
          cargo fetch 2>&1 | tail -3

      - name: Patch anchor-syn
        run: |
          F=$(find ~/.cargo/registry/src -name "defined.rs" -path "*anchor-syn*" 2>/dev/null | head -1 || true)
          if [ -z "$F" ]; then echo "anchor-syn not found in registry"; exit 0; fi
          sed -i 's/#\[cfg(procmacro2_semver_exempt)\]/#[cfg(procmacro2_semver_exempt_disabled)]/g' "$F"
          echo "Patched: $F"

      - name: Build
        working-directory: project
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
        run: anchor build --skip-lint

      - name: Save IDL
        run: |
          IDL=$(find project/target/idl -name "*.json" 2>/dev/null | head -1)
          if [ -z "$IDL" ]; then echo "No IDL in project/target/idl/" && exit 1; fi
          mkdir -p outputs
          cp "$IDL" "outputs/${{ inputs.job_id }}.json"
          echo "IDL saved: $(wc -c < outputs/${{ inputs.job_id }}.json) bytes"

      - name: Commit IDL
        run: |
          git pull --rebase origin main || true
          git add "outputs/${{ inputs.job_id }}.json"
          git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -m "IDL for ${{ inputs.job_id }}"
          git push
