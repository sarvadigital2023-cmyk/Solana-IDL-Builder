name: Generate Anchor IDL
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID for tracking
        required: true
        type: string

env:
  SOLANA_VERSION: "1.18.26"
  SOLANA_INSTALL_DIR: /home/runner/.local/share/solana/install
  SOLANA_BIN: /home/runner/.local/share/solana/install/active_release/bin

jobs:
  generate-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify lib.rs
        run: |
          FILE="inputs/${{ inputs.job_id }}/lib.rs"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: lib.rs not found at $FILE"
            exit 1
          fi
          echo "lib.rs found: $(wc -c < $FILE) bytes"
          cp "$FILE" /tmp/lib.rs

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev curl bzip2

      - name: Setup Rust 1.77
        uses: dtolnay/rust-toolchain@1.77
        with:
          toolchain: "1.77"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-anchor-0.30.1-rust177-${{ runner.os }}-v1

      - name: Cache Anchor CLI binary
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-bin-0.30.1-rust177-${{ runner.os }}-v1

      - name: Install Anchor CLI 0.30.1
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          echo "Installing anchor-cli 0.30.1 from crates.io..."
          cargo install anchor-cli --version "=0.30.1" --force
          anchor --version

      - name: Verify Anchor version
        run: anchor --version

      - name: Cache Solana installation
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ${{ env.SOLANA_INSTALL_DIR }}
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}-v1

      - name: Install Solana ${{ env.SOLANA_VERSION }}
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          TARBALL="solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          mkdir -p "${{ env.SOLANA_INSTALL_DIR }}"
          echo "Downloading Solana v${{ env.SOLANA_VERSION }} from GitHub releases..."
          curl -L --retry 5 --retry-delay 10 --retry-connrefused \
            "https://github.com/solana-labs/solana/releases/download/v${{ env.SOLANA_VERSION }}/${TARBALL}" \
            -o /tmp/solana.tar.bz2
          echo "Extracting..."
          tar xjf /tmp/solana.tar.bz2 -C "${{ env.SOLANA_INSTALL_DIR }}"
          ln -sfn "${{ env.SOLANA_INSTALL_DIR }}/solana-release" "${{ env.SOLANA_INSTALL_DIR }}/active_release"

      - name: Add Solana to PATH
        run: |
          echo "${{ env.SOLANA_BIN }}" >> "$GITHUB_PATH"
          "${{ env.SOLANA_BIN }}/solana" --version

      - name: Solana keygen
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Setup Anchor project from template
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"

          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || echo deployer)
          echo "Program name: $PROG"

          RAW_ADDR=$(grep -oP '(?<=declare_id!\(")[^"]+' /tmp/lib.rs 2>/dev/null | head -1 || true)
          echo "Raw address: $RAW_ADDR"

          if python3 scripts/check_b58.py "$RAW_ADDR" 2>&1; then
            ADDR="$RAW_ADDR"
            echo "Using declare_id address: $ADDR"
          else
            echo "Invalid Base58 — generating fresh keypair..."
            TMP_KEY=/tmp/idl-build-key.json
            solana-keygen new --no-bip39-passphrase -o "$TMP_KEY" --force
            ADDR=$(solana-keygen pubkey "$TMP_KEY")
            echo "Generated address: $ADDR"
          fi
          echo "Final address: $ADDR"

          mkdir -p anchor-project/programs/deployer/src
          cp /tmp/lib.rs anchor-project/programs/deployer/src/lib.rs
          cp template/Cargo.toml anchor-project/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" \
            template/programs/deployer/Cargo.toml.tpl > anchor-project/programs/deployer/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" \
            template/Anchor.toml.tpl > anchor-project/Anchor.toml

          if [ "$ADDR" != "$RAW_ADDR" ]; then
            python3 scripts/patch_declare_id.py anchor-project/programs/deployer/src/lib.rs "$ADDR"
          fi

          echo "=== declare_id check ===" && grep "declare_id" anchor-project/programs/deployer/src/lib.rs
          echo "=== Anchor.toml ===" && cat anchor-project/Anchor.toml

      - name: Build Anchor project
        working-directory: anchor-project
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"
          # Remove any stale Cargo.lock (may be incompatible version format)
          rm -f Cargo.lock
          echo "Rust version: $(rustc --version)"
          echo "Cargo version: $(cargo --version)"
          anchor build 2>&1
          echo "Build exit code: $?"

      - name: Save IDL output
        run: |
          IDL=$(find anchor-project/target/idl -name "*.json" 2>/dev/null | head -1)
          if [ -z "$IDL" ]; then
            echo "ERROR: No IDL found"
            find anchor-project/target/ -name "*.json" 2>/dev/null | head -20 || true
            exit 1
          fi
          echo "Found IDL: $IDL"
          cat "$IDL"
          mkdir -p outputs
          cp "$IDL" "outputs/${{ inputs.job_id }}.json"

      - name: Commit IDL output
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          git pull --rebase origin main || true
          git add "outputs/$JOB_ID.json"
          git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -m "IDL output for $JOB_ID"
          git push
