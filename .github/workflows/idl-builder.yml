name: Generate Anchor IDL
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID for tracking
        required: true
        type: string

env:
  SOLANA_VERSION: "2.3.1"
  SOLANA_INSTALL_DIR: /home/runner/.local/share/solana/install
  SOLANA_BIN: /home/runner/.local/share/solana/install/active_release/bin

jobs:
  generate-idl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify lib.rs
        run: |
          FILE="inputs/${{ inputs.job_id }}/lib.rs"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: lib.rs not found at $FILE"
            exit 1
          fi
          echo "lib.rs found: $(wc -c < $FILE) bytes"
          cp "$FILE" /tmp/lib.rs

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev curl bzip2

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-anchor0301-stable-${{ runner.os }}-v4

      - name: Cache Anchor CLI binary
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-bin-0.30.1-stable-${{ runner.os }}-v6

      - name: Install Anchor CLI 0.30.1
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install anchor-cli --version "=0.30.1" --force
          anchor --version

      - name: Verify Anchor version
        run: anchor --version

      - name: Cache Solana and platform-tools
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOLANA_INSTALL_DIR }}
            ~/.cache/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}-v2

      - name: Install Solana ${{ env.SOLANA_VERSION }}
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          TARBALL="solana-release-x86_64-unknown-linux-gnu.tar.bz2"
          mkdir -p "${{ env.SOLANA_INSTALL_DIR }}"
          curl -L --retry 5 --retry-delay 10 --retry-connrefused \
            "https://github.com/anza-xyz/agave/releases/download/v${{ env.SOLANA_VERSION }}/${TARBALL}" \
            -o /tmp/solana.tar.bz2
          tar xjf /tmp/solana.tar.bz2 -C "${{ env.SOLANA_INSTALL_DIR }}"
          ln -sfn "${{ env.SOLANA_INSTALL_DIR }}/solana-release" "${{ env.SOLANA_INSTALL_DIR }}/active_release"

      - name: Add Solana to PATH
        run: |
          echo "${{ env.SOLANA_BIN }}" >> "$GITHUB_PATH"
          "${{ env.SOLANA_BIN }}/solana" --version

      - name: Solana keygen
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Setup Anchor project from template
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"
          PROG=$(grep -oP 'pub mod \K\w+' /tmp/lib.rs | head -1 || echo deployer)
          echo "Program name: $PROG"
          RAW_ADDR=$(grep -oP '(?<=declare_id!\(")[^"]+' /tmp/lib.rs 2>/dev/null | head -1 || true)
          echo "Raw address: $RAW_ADDR"
          if python3 scripts/check_b58.py "$RAW_ADDR" 2>&1; then
            ADDR="$RAW_ADDR"
          else
            echo "Invalid Base58 — generating fresh keypair..."
            TMP_KEY=/tmp/idl-build-key.json
            solana-keygen new --no-bip39-passphrase -o "$TMP_KEY" --force
            ADDR=$(solana-keygen pubkey "$TMP_KEY")
            echo "Generated: $ADDR"
          fi
          echo "Using address: $ADDR"
          mkdir -p anchor-project/programs/deployer/src
          cp /tmp/lib.rs anchor-project/programs/deployer/src/lib.rs
          cp template/Cargo.toml anchor-project/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" \
            template/programs/deployer/Cargo.toml.tpl > anchor-project/programs/deployer/Cargo.toml
          sed "s/{{PROG_NAME}}/$PROG/g; s/{{PROG_ADDR}}/$ADDR/g" \
            template/Anchor.toml.tpl > anchor-project/Anchor.toml
          if [ "$ADDR" != "$RAW_ADDR" ]; then
            python3 scripts/patch_declare_id.py anchor-project/programs/deployer/src/lib.rs "$ADDR"
          fi
          echo "=== declare_id ===" && grep "declare_id" anchor-project/programs/deployer/src/lib.rs
          echo "PROG=$PROG" >> "$GITHUB_ENV"
          echo "PROG_ADDR=$ADDR" >> "$GITHUB_ENV"

      - name: Prime platform-tools download
        working-directory: anchor-project
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"
          PT_CHECK=$(find ~/.cache/solana -name "cargo" -path "*/rust/bin/cargo" -type f 2>/dev/null | head -1)
          if [ -n "$PT_CHECK" ]; then
            echo "Platform-tools already cached: $($PT_CHECK --version)"
            exit 0
          fi
          echo "Triggering platform-tools download via anchor build..."
          anchor build --skip-lint 2>&1 || true
          find ~/.cache/solana -name "cargo" -path "*/rust/bin/cargo" -type f 2>/dev/null | while read f; do
            echo "Found: $f ($($f --version 2>/dev/null || echo error))"
          done

      - name: Replace platform-tools cargo with host cargo 1.94
        run: |
          PT_CARGO=$(find ~/.cache/solana -name "cargo" -path "*/rust/bin/cargo" -type f 2>/dev/null | head -1)
          STABLE_TC=$(ls ~/.rustup/toolchains/ 2>/dev/null | grep "^stable-" | head -1)
          REAL_CARGO="$HOME/.rustup/toolchains/${STABLE_TC}/bin/cargo"
          if [ -z "$PT_CARGO" ]; then
            echo "ERROR: Platform-tools cargo not found"
            exit 1
          fi
          echo "Bundled cargo: $($PT_CARGO --version)"
          echo "Host cargo: $REAL_CARGO ($($REAL_CARGO --version))"
          cp "$REAL_CARGO" "$PT_CARGO"
          echo "Upgraded cargo to: $($PT_CARGO --version)"

      - name: Pin dependencies to pre-Rust-1.85 versions and generate lockfile
        working-directory: anchor-project
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"
          mkdir -p .cargo ~/.cargo
          # Allow incompatible rust-version during resolution to generate initial lockfile
          echo "[resolver]" > .cargo/config.toml
          echo 'incompatible-rust-versions = "allow"' >> .cargo/config.toml
          echo "[resolver]" > ~/.cargo/config.toml
          echo 'incompatible-rust-versions = "allow"' >> ~/.cargo/config.toml
          rm -f Cargo.lock
          cargo generate-lockfile 2>&1 | head -5 || true
          echo "=== Initial versions of key packages ==="
          for PKG in blake3 sha3 hmac digest crypto-common block-buffer cmov ctutils constant_time_eq cpufeatures hybrid-array; do
            VERS=$(grep -A3 "^name = \"$PKG\"" Cargo.lock | grep "^version" | awk '{print $3}' | tr -d '"' | tr '\n' ' ') || true
            echo "  $PKG: ${VERS:-not found}"
          done
          echo "=== Pinning root cause: blake3 ==="
          # blake3 1.8+ requires digest ^0.11.2 -> crypto-common 0.2.1, block-buffer 0.12.0,
          # cmov 0.5.3, ctutils 0.4.2 (all Rust 1.85+) and constant_time_eq ^0.4.2 (Rust 1.85)
          # blake3 1.7.x uses digest ^0.10 (Rust 1.84 compatible)
          # solana-program 1.18.26 requires blake3 ^1.5.0, so 1.7.x satisfies the constraint
          cargo update blake3 --precise 1.7.0 2>&1
          BLAKE3_RC=$?
          if [ $BLAKE3_RC -eq 0 ]; then
            echo "blake3 pinned to 1.7.0 OK"
          else
            echo "WARN: blake3 1.7.0 pin failed, trying 1.7.1"
            cargo update blake3 --precise 1.7.1 2>&1 && echo "blake3 1.7.1 OK" || echo "WARN: blake3 1.7.1 also failed"
          fi
          echo "=== Pinning sha3 to pre-digest-0.11 version ==="
          # sha3 0.10.8 requires digest ^0.11.2; sha3 0.10.7 uses digest ^0.10
          # Need version specifier because there are multiple sha3 versions
          cargo update sha3@0.10.8 --precise 0.10.7 2>&1 && echo "sha3 pinned OK" || echo "WARN: sha3 pin failed"
          echo "=== Pinning hmac to pre-digest-0.11 version ==="
          cargo update hmac@0.12.1 --precise 0.12.0 2>&1 && echo "hmac pinned OK" || echo "WARN: hmac pin failed"
          echo "=== Pinning proc-macro-crate to pre-edition2024 version ==="
          cargo update proc-macro-crate@3.5.0 --precise 3.2.0 2>&1 && echo "proc-macro-crate pinned OK" || echo "WARN: proc-macro-crate pin failed"
          echo "=== Final versions ==="
          for PKG in blake3 sha3 hmac digest crypto-common block-buffer cmov ctutils constant_time_eq cpufeatures hybrid-array proc-macro-crate; do
            VERS=$(grep -A3 "^name = \"$PKG\"" Cargo.lock | grep "^version" | awk '{print $3}' | tr -d '"' | tr '\n' ' ') || true
            echo "  $PKG: ${VERS:-not found}"
          done

      - name: Build Anchor project
        working-directory: anchor-project
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
        run: |
          export PATH="${{ env.SOLANA_BIN }}:$PATH"
          PT_CARGO=$(find ~/.cache/solana -name cargo -path '*/rust/bin/cargo' -type f 2>/dev/null | head -1)
          echo "PT cargo: $($PT_CARGO --version 2>/dev/null)"
          echo "Host rustc: $(rustc --version)"
          echo "CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS=$CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS"
          anchor build --skip-lint 2>&1
          BUILD_EXIT=$?
          echo "Build exit code: $BUILD_EXIT"
          ls -la target/idl/ 2>/dev/null || echo "no target/idl"
          exit $BUILD_EXIT

      - name: Save IDL output
        run: |
          JOB_ID="${{ inputs.job_id }}"
          IDL=$(find anchor-project/target/idl -name "*.json" 2>/dev/null | head -1)
          if [ -z "$IDL" ]; then
            echo "ERROR: No IDL in target/idl"
            exit 1
          fi
          echo "Found IDL: $IDL"
          node -e "const f=require('fs'); const d=JSON.parse(f.readFileSync('$IDL')); console.log('Valid JSON, keys:', Object.keys(d).slice(0,5).join(','))"
          mkdir -p outputs
          cp "$IDL" "outputs/$JOB_ID.json"

      - name: Commit IDL output
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          git pull --rebase origin main || true
          git add "outputs/$JOB_ID.json"
          git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -m "IDL output for $JOB_ID"
          git push
